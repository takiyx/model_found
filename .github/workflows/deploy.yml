name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        # Default deployment script. Modify the target dictionary and restart command as needed.
        script: |
          cd /var/www/model_found
          git pull origin main
          npm install
          
          # Prisma generate and migrate
          npx prisma generate
          npx prisma migrate deploy

          # Build Next.js
          npm run build
          
          # Restart application (Assuming PM2 is used: pm2 start npm --name "model_found" -- start)
          pm2 reload model_found || pm2 start npm --name "model_found" -- start
